# 放到 repo 的 .github/workflows/sync-hymns.yml
name: sync-hymns

on:
  schedule:
    - cron: '0 20 1 * *'    # 每月 1 號 UTC 20:00 = 台灣時間 04:00。改週更用 '0 20 * * 0'(每週日)
  workflow_dispatch:         # 手動觸發鈕(Actions 分頁按 Run workflow)

permissions:
  contents: write            # 允許 workflow push 回 repo

concurrency: sync-hymns      # 避免兩次同步同時跑

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20   # Node 18+ 內建 fetch,不需裝任何套件

      - name: Fetch + diff
        id: sync
        run: node scripts/sync.mjs

      - name: Commit if changed
        run: |
          git config user.name  "hymn-bot"
          git config user.email "hymn-bot@users.noreply.github.com"
          git add -A
          # 只有真的有變動才 commit,沒變就跳過
          git diff --staged --quiet || git commit -m "sync ${{ steps.sync.outputs.summary }} ($(date -u +%F))"
          git push
